name: Build Android Binaries (Static)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026.06.13)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ─── arm64-v8a ────────────────────────────────────────────────────────────────
  build-arm64:
    name: Android arm64-v8a
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build + staticx inside musllinux Docker (aarch64)
        working-directory: zeusdl/zeusdl
        run: |
          chmod +x bundle/docker/linux/build.sh

          # Helper script runs INSIDE the musl container
          # (so ldd speaks musl and staticx works correctly)
          cat > /tmp/build_and_staticx.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          # 1. Build the binary
          bash /yt-dlp/bundle/docker/linux/build.sh

          # 2. Prepare pip access (same trick as build.sh)
          PY_PURELIB="$(py3.13 -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          export PYTHONPATH="$PY_PURELIB"
          SXPKG=/tmp/sx_pkg
          mkdir -p "$SXPKG"

          # 3. Install SCons first (pure Python) and add to PATH
          #    so the staticx bootloader build can find 'scons'
          py3.13 -m pip install SCons --target "$SXPKG" --quiet
          export PATH="$SXPKG/bin:$PATH"

          # 4. Install staticx + patchelf
          py3.13 -m pip install staticx patchelf --target "$SXPKG" --quiet

          # 5. Make binary truly static (embeds musl linker + deps)
          EXE="/yt-dlp/dist/${EXE_NAME}"
          PYTHONPATH="$SXPKG:$PY_PURELIB" "$SXPKG/bin/staticx" "${EXE}" "${EXE}-static"
          mv "${EXE}-static" "${EXE}"

          file "${EXE}"
          ls -lh "${EXE}"
          INNEREOF

          chmod +x /tmp/build_and_staticx.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_and_staticx.sh:/build_and_staticx.sh:ro" \
            -e EXE_NAME="zeusdl-android-arm64" \
            -e CHANNEL="stable" \
            -e ORIGIN="ferelking242/zeusdl" \
            -e VERSION="${{ inputs.tag || github.run_number }}" \
            -e REQUIREMENTS="musllinux-aarch64" \
            -e SKIP_ONEDIR_BUILD="1" \
            ghcr.io/yt-dlp/musllinux_1_2_aarch64-shared:latest \
            bash /build_and_staticx.sh

      - name: Verify — no dynamic interpreter
        working-directory: zeusdl/zeusdl
        run: |
          ! strings dist/zeusdl-android-arm64 | grep -q 'ld-musl' || \
            (echo "ERROR: musl linker still referenced" && exit 1)
          echo "OK — binary is fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: zeusdl/zeusdl/dist/zeusdl-android-arm64

  # ─── x86_64 ───────────────────────────────────────────────────────────────────
  build-x86_64:
    name: Android x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build + staticx inside musllinux Docker (x86_64)
        working-directory: zeusdl/zeusdl
        run: |
          chmod +x bundle/docker/linux/build.sh

          cat > /tmp/build_and_staticx.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          bash /yt-dlp/bundle/docker/linux/build.sh

          PY_PURELIB="$(py3.13 -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          export PYTHONPATH="$PY_PURELIB"
          SXPKG=/tmp/sx_pkg
          mkdir -p "$SXPKG"

          py3.13 -m pip install SCons --target "$SXPKG" --quiet
          export PATH="$SXPKG/bin:$PATH"

          py3.13 -m pip install staticx patchelf --target "$SXPKG" --quiet

          EXE="/yt-dlp/dist/${EXE_NAME}"
          PYTHONPATH="$SXPKG:$PY_PURELIB" "$SXPKG/bin/staticx" "${EXE}" "${EXE}-static"
          mv "${EXE}-static" "${EXE}"

          file "${EXE}"
          ls -lh "${EXE}"
          INNEREOF

          chmod +x /tmp/build_and_staticx.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_and_staticx.sh:/build_and_staticx.sh:ro" \
            -e EXE_NAME="zeusdl-android-x86_64" \
            -e CHANNEL="stable" \
            -e ORIGIN="ferelking242/zeusdl" \
            -e VERSION="${{ inputs.tag || github.run_number }}" \
            -e REQUIREMENTS="musllinux-x86_64" \
            -e SKIP_ONEDIR_BUILD="1" \
            ghcr.io/yt-dlp/musllinux_1_2_x86_64-shared:latest \
            bash /build_and_staticx.sh

      - name: Verify — no dynamic interpreter
        working-directory: zeusdl/zeusdl
        run: |
          ! strings dist/zeusdl-android-x86_64 | grep -q 'ld-musl' || \
            (echo "ERROR: musl linker still referenced" && exit 1)
          echo "OK — binary is fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: zeusdl/zeusdl/dist/zeusdl-android-x86_64

  # ─── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-arm64, build-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum zeusdl-android-arm64 zeusdl-android-x86_64 | tee SHA256SUMS.txt

      - name: Compute tag name
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(date -u '+%Y.%m.%d')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL Android — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL Android — Binaires 100% Statiques

            Compilés avec **musl Python 3.13 + PyInstaller + staticx**.
            Le linker musl est **embarqué dans le binaire** — aucune dépendance externe.
            Compatible Android 5.0+ (API 21+), arm64-v8a et x86_64.

            | Fichier | Architecture |
            |---------|-------------|
            | `zeusdl-android-arm64` | arm64-v8a (quasi tous les appareils modernes) |
            | `zeusdl-android-x86_64` | x86_64 (émulateurs, Chromebooks x86) |
          files: |
            dist/zeusdl-android-arm64
            dist/zeusdl-android-x86_64
            dist/SHA256SUMS.txt
