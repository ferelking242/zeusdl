name: Build All Binaries (Android + PC)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026.06.13)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ─── Android arm64-v8a ────────────────────────────────────────────────────────
  build-android-arm64:
    name: Android arm64-v8a
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build + staticx inside musllinux Docker (aarch64)
        working-directory: zeusdl/zeusdl
        run: |
          chmod +x bundle/docker/linux/build.sh

          cat > /tmp/build_and_staticx.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          bash /yt-dlp/bundle/docker/linux/build.sh

          PY_PURELIB="$(py3.13 -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          export PYTHONPATH="$PY_PURELIB"

          py3.13 -m venv /tmp/sx_venv --without-pip
          /tmp/sx_venv/bin/python -m pip install setuptools SCons --quiet

          export PATH="/tmp/sx_venv/bin:$PATH"
          /tmp/sx_venv/bin/python -m pip install staticx patchelf --no-build-isolation --quiet

          EXE="/yt-dlp/dist/${EXE_NAME}"
          /tmp/sx_venv/bin/staticx "${EXE}" "${EXE}-static"
          mv "${EXE}-static" "${EXE}"

          file "${EXE}"
          ls -lh "${EXE}"
          INNEREOF

          chmod +x /tmp/build_and_staticx.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_and_staticx.sh:/build_and_staticx.sh:ro" \
            -e EXE_NAME="zeusdl-android-arm64" \
            -e CHANNEL="stable" \
            -e ORIGIN="ferelking242/zeusdl" \
            -e VERSION="${{ inputs.tag || github.run_number }}" \
            -e REQUIREMENTS="musllinux-aarch64" \
            -e SKIP_ONEDIR_BUILD="1" \
            ghcr.io/yt-dlp/musllinux_1_2_aarch64-shared:latest \
            bash /build_and_staticx.sh

          sudo chmod -R a+r dist/

      - name: Verify — statically linked
        working-directory: zeusdl/zeusdl
        run: |
          file dist/zeusdl-android-arm64 | grep -q 'statically linked' || \
            (echo "ERROR: binary is not statically linked" && exit 1)
          echo "OK — arm64 binary is fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: zeusdl/zeusdl/dist/zeusdl-android-arm64

  # ─── Android x86_64 ───────────────────────────────────────────────────────────
  build-android-x86_64:
    name: Android x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build + staticx inside musllinux Docker (x86_64)
        working-directory: zeusdl/zeusdl
        run: |
          chmod +x bundle/docker/linux/build.sh

          cat > /tmp/build_and_staticx.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          bash /yt-dlp/bundle/docker/linux/build.sh

          PY_PURELIB="$(py3.13 -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          export PYTHONPATH="$PY_PURELIB"

          py3.13 -m venv /tmp/sx_venv --without-pip
          /tmp/sx_venv/bin/python -m pip install setuptools SCons --quiet

          export PATH="/tmp/sx_venv/bin:$PATH"
          /tmp/sx_venv/bin/python -m pip install staticx patchelf --no-build-isolation --quiet

          EXE="/yt-dlp/dist/${EXE_NAME}"
          /tmp/sx_venv/bin/staticx "${EXE}" "${EXE}-static"
          mv "${EXE}-static" "${EXE}"

          file "${EXE}"
          ls -lh "${EXE}"
          INNEREOF

          chmod +x /tmp/build_and_staticx.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_and_staticx.sh:/build_and_staticx.sh:ro" \
            -e EXE_NAME="zeusdl-android-x86_64" \
            -e CHANNEL="stable" \
            -e ORIGIN="ferelking242/zeusdl" \
            -e VERSION="${{ inputs.tag || github.run_number }}" \
            -e REQUIREMENTS="musllinux-x86_64" \
            -e SKIP_ONEDIR_BUILD="1" \
            ghcr.io/yt-dlp/musllinux_1_2_x86_64-shared:latest \
            bash /build_and_staticx.sh

          sudo chmod -R a+r dist/

      - name: Verify — statically linked
        working-directory: zeusdl/zeusdl
        run: |
          file dist/zeusdl-android-x86_64 | grep -q 'statically linked' || \
            (echo "ERROR: binary is not statically linked" && exit 1)
          echo "OK — x86_64 binary is fully static"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: zeusdl/zeusdl/dist/zeusdl-android-x86_64

  # ─── Linux x64 ────────────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Linux binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-linux-x64 \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-linux-x64
          ls -lh dist/zeusdl-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-linux-x64
          path: zeusdl/zeusdl/dist/zeusdl-linux-x64

  # ─── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-macos \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-macos
          ls -lh dist/zeusdl-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-macos
          path: zeusdl/zeusdl/dist/zeusdl-macos

  # ─── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows binary
        working-directory: zeusdl/zeusdl
        shell: pwsh
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>$null
          if ($LASTEXITCODE -ne 0) { pip install -e "." --quiet }
          python -m PyInstaller `
            --onefile `
            --name zeusdl-windows-x64 `
            --strip `
            zeusdl/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-windows-x64
          path: zeusdl/zeusdl/dist/zeusdl-windows-x64.exe

  # ─── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-android-arm64
      - build-android-x86_64
      - build-linux-x64
      - build-macos
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum \
            zeusdl-android-arm64 \
            zeusdl-android-x86_64 \
            zeusdl-linux-x64 \
            zeusdl-macos \
            zeusdl-windows-x64.exe \
            | tee SHA256SUMS.txt

      - name: Compute tag name
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(date -u '+%Y.%m.%d')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL — ${{ steps.tag.outputs.tag }}

            ### Android — Binaires 100% Statiques
            Compilés avec **musl Python 3.13 + PyInstaller + staticx**.
            Le linker musl est embarqué — aucune dépendance externe.
            Compatible Android 5.0+ (API 21+).

            | Fichier | Architecture |
            |---------|-------------|
            | `zeusdl-android-arm64` | Android arm64-v8a (99% des appareils modernes) |
            | `zeusdl-android-x86_64` | Android x86_64 (émulateurs, Chromebooks x86) |

            ### PC — Binaires Natifs
            Compilés avec **Python 3.12 + PyInstaller** nativement.

            | Fichier | Plateforme |
            |---------|-----------|
            | `zeusdl-linux-x64` | Linux x86_64 |
            | `zeusdl-macos` | macOS (Apple Silicon + Intel) |
            | `zeusdl-windows-x64.exe` | Windows x64 |

            `SHA256SUMS.txt` — vérification d'intégrité de tous les binaires.
          files: |
            dist/zeusdl-android-arm64
            dist/zeusdl-android-x86_64
            dist/zeusdl-linux-x64
            dist/zeusdl-macos
            dist/zeusdl-windows-x64.exe
            dist/SHA256SUMS.txt
