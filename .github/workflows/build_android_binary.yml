name: Build All Binaries (Android + PC)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026.06.13)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ─── Android arm64-v8a ────────────────────────────────────────────────────────
  build-android-arm64:
    name: Android arm64-v8a (PIE)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain + patchelf
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools patchelf binutils

      - name: Download python-build-standalone musl aarch64
        run: |
          PBS_TAG="20260610"
          PBS_FILE="cpython-3.13.14+${PBS_TAG}-aarch64-unknown-linux-musl-install_only.tar.gz"
          PBS_URL="https://github.com/indygreg/python-build-standalone/releases/download/${PBS_TAG}/${PBS_FILE}"
          wget -q "$PBS_URL" -O /tmp/pbs-python.tar.gz
          mkdir -p /opt/pbs-python
          tar -xf /tmp/pbs-python.tar.gz -C /opt/pbs-python/
          echo "PBS Python:"
          /opt/pbs-python/python/bin/python3.13 --version
          echo "Static lib present:"
          ls /opt/pbs-python/python/lib/libpython*.a || echo "WARN: no .a — build may fail"

      - name: Build static-PIE binary (aarch64 — Nuitka + musl-gcc)
        working-directory: zeusdl/zeusdl
        env:
          PYTHON: /opt/pbs-python/python/bin/python3.13
        run: |
          set -euo pipefail
          $PYTHON -m pip install -e ".[default]" --quiet 2>/dev/null || $PYTHON -m pip install -e "." --quiet
          $PYTHON -m pip install nuitka ordered-set zstandard --quiet
          $PYTHON -m nuitka --version
          mkdir -p dist
          CC=musl-gcc CFLAGS="-fPIE" LDFLAGS="-static-pie" \
          $PYTHON -m nuitka \
              --onefile \
              --static-libpython=yes \
              --output-dir=dist \
              --output-filename="zeusdl-android-arm64" \
              --assume-yes-for-downloads \
              --lto=yes \
              --python-flag=no_site \
              zeusdl/__main__.py
          file dist/zeusdl-android-arm64
          ls -lh dist/zeusdl-android-arm64
          echo "=== Dynamic deps (should be empty for static-PIE) ==="
          readelf -d dist/zeusdl-android-arm64 | grep NEEDED || echo "OK: no dynamic NEEDED entries"

      - name: Verify PIE (ET_DYN) — mandatory for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          ELF_TYPE=$(dd if=dist/zeusdl-android-arm64 bs=1 skip=16 count=2 2>/dev/null | xxd -p)
          echo "ELF e_type=0x${ELF_TYPE} (ET_DYN=0x0300 required for Android)"
          [ "${ELF_TYPE}" = "0300" ] || { echo "ERROR: not PIE/ET_DYN — rebuild with Nuitka PIE"; exit 1; }
          echo "OK: arm64 is PIE/ET_DYN — will be installed to nativeLibraryDir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: zeusdl/zeusdl/dist/zeusdl-android-arm64

  # ─── Android x86_64 ───────────────────────────────────────────────────────────
  build-android-x86_64:
    name: Android x86_64 (PIE)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain + patchelf
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools patchelf binutils

      - name: Download python-build-standalone musl x86_64
        run: |
          PBS_TAG="20260610"
          PBS_FILE="cpython-3.13.14+${PBS_TAG}-x86_64-unknown-linux-musl-install_only.tar.gz"
          PBS_URL="https://github.com/indygreg/python-build-standalone/releases/download/${PBS_TAG}/${PBS_FILE}"
          wget -q "$PBS_URL" -O /tmp/pbs-python.tar.gz
          mkdir -p /opt/pbs-python
          tar -xf /tmp/pbs-python.tar.gz -C /opt/pbs-python/
          echo "PBS Python:"
          /opt/pbs-python/python/bin/python3.13 --version
          echo "Static lib present:"
          ls /opt/pbs-python/python/lib/libpython*.a || echo "WARN: no .a — build may fail"

      - name: Build static-PIE binary (x86_64 — Nuitka + musl-gcc)
        working-directory: zeusdl/zeusdl
        env:
          PYTHON: /opt/pbs-python/python/bin/python3.13
        run: |
          set -euo pipefail
          $PYTHON -m pip install -e ".[default]" --quiet 2>/dev/null || $PYTHON -m pip install -e "." --quiet
          $PYTHON -m pip install nuitka ordered-set zstandard --quiet
          $PYTHON -m nuitka --version
          mkdir -p dist
          CC=musl-gcc CFLAGS="-fPIE" LDFLAGS="-static-pie" \
          $PYTHON -m nuitka \
              --onefile \
              --static-libpython=yes \
              --output-dir=dist \
              --output-filename="zeusdl-android-x86_64" \
              --assume-yes-for-downloads \
              --lto=yes \
              --python-flag=no_site \
              zeusdl/__main__.py
          file dist/zeusdl-android-x86_64
          ls -lh dist/zeusdl-android-x86_64
          echo "=== Dynamic deps (should be empty for static-PIE) ==="
          readelf -d dist/zeusdl-android-x86_64 | grep NEEDED || echo "OK: no dynamic NEEDED entries"

      - name: Verify PIE (ET_DYN) — mandatory for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          ELF_TYPE=$(dd if=dist/zeusdl-android-x86_64 bs=1 skip=16 count=2 2>/dev/null | xxd -p)
          echo "ELF e_type=0x${ELF_TYPE} (ET_DYN=0x0300 required for Android)"
          [ "${ELF_TYPE}" = "0300" ] || { echo "ERROR: not PIE/ET_DYN — rebuild with Nuitka PIE"; exit 1; }
          echo "OK: x86_64 is PIE/ET_DYN — will be installed to nativeLibraryDir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: zeusdl/zeusdl/dist/zeusdl-android-x86_64


  # ─── Linux x64 ────────────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Linux binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-linux-x64 \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-linux-x64
          ls -lh dist/zeusdl-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-linux-x64
          path: zeusdl/zeusdl/dist/zeusdl-linux-x64

  # ─── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-macos \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-macos
          ls -lh dist/zeusdl-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-macos
          path: zeusdl/zeusdl/dist/zeusdl-macos

  # ─── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows binary
        working-directory: zeusdl/zeusdl
        shell: pwsh
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>$null
          if ($LASTEXITCODE -ne 0) { pip install -e "." --quiet }
          python -m PyInstaller `
            --onefile `
            --name zeusdl-windows-x64 `
            --strip `
            zeusdl/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-windows-x64
          path: zeusdl/zeusdl/dist/zeusdl-windows-x64.exe

  # ─── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-android-arm64
      - build-android-x86_64
      - build-linux-x64
      - build-macos
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum \
            zeusdl-android-arm64 \
            zeusdl-android-x86_64 \
            zeusdl-linux-x64 \
            zeusdl-macos \
            zeusdl-windows-x64.exe \
            | tee SHA256SUMS.txt

      - name: Compute tag name
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(date -u '+%Y.%m.%d')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL — ${{ steps.tag.outputs.tag }}

            ### Android — Binaires 100% Statiques (musl-static PIE)
            Compilés avec **python-build-standalone musl 3.13 + Nuitka + musl-gcc `-static-pie`**.
            Binaires PIE (ET_DYN) sans aucune dépendance dynamique — zéro `libc.musl-*.so` requis.
            Compatible Android 5.0+ (API 21+), arm64-v8a et x86_64.

            | Fichier | Architecture |
            |---------|-------------|
            | `zeusdl-android-arm64` | Android arm64-v8a (99% des appareils modernes) |
            | `zeusdl-android-x86_64` | Android x86_64 (émulateurs, Chromebooks x86) |

            ### PC — Binaires Natifs
            Compilés avec **Python 3.12 + PyInstaller** nativement.

            | Fichier | Plateforme |
            |---------|-----------|
            | `zeusdl-linux-x64` | Linux x86_64 |
            | `zeusdl-macos` | macOS (Apple Silicon + Intel) |
            | `zeusdl-windows-x64.exe` | Windows x64 |

            `SHA256SUMS.txt` — vérification d'intégrité de tous les binaires.
          files: |
            dist/zeusdl-android-arm64
            dist/zeusdl-android-x86_64
            dist/zeusdl-linux-x64
            dist/zeusdl-macos
            dist/zeusdl-windows-x64.exe
            dist/SHA256SUMS.txt
