name: Build All Binaries (Android + PC)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026.06.13)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ─── Android arm64-v8a ────────────────────────────────────────────────────────
  build-android-arm64:
    name: Android arm64-v8a (PIE)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build PIE binary inside musllinux Docker (aarch64 — Nuitka)
        working-directory: zeusdl/zeusdl
        run: |
          cat > /tmp/build_nuitka.sh << 'INNEREOF'
          #!/bin/bash
          set -ex
          cd /yt-dlp
          py3.13 -m pip install -e ".[default]" --quiet 2>/dev/null || py3.13 -m pip install -e "." --quiet
          py3.13 -m pip install nuitka ordered-set zstandard --quiet
          py3.13 -m nuitka --version
          mkdir -p /yt-dlp/dist
          CFLAGS="-fPIE" LDFLAGS="-pie -static-libgcc" py3.13 -m nuitka \
              --onefile \
              --output-dir=/yt-dlp/dist \
              --output-filename="${EXE_NAME}" \
              --assume-yes-for-downloads \
              --lto=yes \
              --static-libpython=yes \
              --python-flag=no_site \
              /yt-dlp/zeusdl/__main__.py
          file /yt-dlp/dist/${EXE_NAME}
          ls -lh /yt-dlp/dist/${EXE_NAME}
          # Verify no musl dynamic dep
          readelf -d /yt-dlp/dist/${EXE_NAME} | grep NEEDED || echo "OK: no dynamic deps"
          INNEREOF
          chmod +x /tmp/build_nuitka.sh
          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_nuitka.sh:/build_nuitka.sh:ro" \
            -e EXE_NAME="zeusdl-android-arm64" \
            ghcr.io/yt-dlp/musllinux_1_2_aarch64:latest \
            bash /build_nuitka.sh
          sudo chmod -R a+r dist/

      - name: Verify PIE (ET_DYN) — mandatory for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          # e_type bytes 16-17 little-endian: ET_DYN=0x0003 → xxd = "0300"
          ELF_TYPE=$(dd if=dist/zeusdl-android-arm64 bs=1 skip=16 count=2 2>/dev/null | xxd -p)
          echo "ELF e_type=0x${ELF_TYPE} (ET_DYN=0x0300 required for Android)"
          [ "${ELF_TYPE}" = "0300" ] || { echo "ERROR: not PIE/ET_DYN — rebuild with Nuitka PIE"; exit 1; }
          echo "OK: arm64 is PIE/ET_DYN — will be installed to nativeLibraryDir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: zeusdl/zeusdl/dist/zeusdl-android-arm64

  # ─── Android x86_64 ───────────────────────────────────────────────────────────
  build-android-x86_64:
    name: Android x86_64 (PIE)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build PIE binary inside musllinux Docker (x86_64 — Nuitka)
        working-directory: zeusdl/zeusdl
        run: |
          cat > /tmp/build_nuitka.sh << 'INNEREOF'
          #!/bin/bash
          set -ex
          cd /yt-dlp
          py3.13 -m pip install -e ".[default]" --quiet 2>/dev/null || py3.13 -m pip install -e "." --quiet
          py3.13 -m pip install nuitka ordered-set zstandard --quiet
          py3.13 -m nuitka --version
          mkdir -p /yt-dlp/dist
          CFLAGS="-fPIE" LDFLAGS="-pie -static-libgcc" py3.13 -m nuitka \
              --onefile \
              --output-dir=/yt-dlp/dist \
              --output-filename="${EXE_NAME}" \
              --assume-yes-for-downloads \
              --lto=yes \
              --static-libpython=yes \
              --python-flag=no_site \
              /yt-dlp/zeusdl/__main__.py
          file /yt-dlp/dist/${EXE_NAME}
          ls -lh /yt-dlp/dist/${EXE_NAME}
          # Verify no musl dynamic dep
          readelf -d /yt-dlp/dist/${EXE_NAME} | grep NEEDED || echo "OK: no dynamic deps"
          INNEREOF
          chmod +x /tmp/build_nuitka.sh
          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_nuitka.sh:/build_nuitka.sh:ro" \
            -e EXE_NAME="zeusdl-android-x86_64" \
            ghcr.io/yt-dlp/musllinux_1_2_x86_64:latest \
            bash /build_nuitka.sh
          sudo chmod -R a+r dist/

      - name: Verify PIE (ET_DYN) — mandatory for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          ELF_TYPE=$(dd if=dist/zeusdl-android-x86_64 bs=1 skip=16 count=2 2>/dev/null | xxd -p)
          echo "ELF e_type=0x${ELF_TYPE} (ET_DYN=0x0300 required for Android)"
          [ "${ELF_TYPE}" = "0300" ] || { echo "ERROR: not PIE/ET_DYN — rebuild with Nuitka PIE"; exit 1; }
          echo "OK: x86_64 is PIE/ET_DYN — will be installed to nativeLibraryDir"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: zeusdl/zeusdl/dist/zeusdl-android-x86_64


  # ─── Linux x64 ────────────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Linux binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-linux-x64 \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-linux-x64
          ls -lh dist/zeusdl-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-linux-x64
          path: zeusdl/zeusdl/dist/zeusdl-linux-x64

  # ─── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-macos \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-macos
          ls -lh dist/zeusdl-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-macos
          path: zeusdl/zeusdl/dist/zeusdl-macos

  # ─── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows binary
        working-directory: zeusdl/zeusdl
        shell: pwsh
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>$null
          if ($LASTEXITCODE -ne 0) { pip install -e "." --quiet }
          python -m PyInstaller `
            --onefile `
            --name zeusdl-windows-x64 `
            --strip `
            zeusdl/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-windows-x64
          path: zeusdl/zeusdl/dist/zeusdl-windows-x64.exe

  # ─── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-android-arm64
      - build-android-x86_64
      - build-linux-x64
      - build-macos
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum \
            zeusdl-android-arm64 \
            zeusdl-android-x86_64 \
            zeusdl-linux-x64 \
            zeusdl-macos \
            zeusdl-windows-x64.exe \
            | tee SHA256SUMS.txt

      - name: Compute tag name
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(date -u '+%Y.%m.%d')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL — ${{ steps.tag.outputs.tag }}

            ### Android — Binaires 100% Statiques
            Compilés avec **musl Python 3.13 + Nuitka PIE**.
            Binaires PIE (ET_DYN) — exec garanti via nativeLibraryDir sur Android 10+.
            Compatible Android 5.0+ (API 21+).

            | Fichier | Architecture |
            |---------|-------------|
            | `zeusdl-android-arm64` | Android arm64-v8a (99% des appareils modernes) |
            | `zeusdl-android-x86_64` | Android x86_64 (émulateurs, Chromebooks x86) |

            ### PC — Binaires Natifs
            Compilés avec **Python 3.12 + PyInstaller** nativement.

            | Fichier | Plateforme |
            |---------|-----------|
            | `zeusdl-linux-x64` | Linux x86_64 |
            | `zeusdl-macos` | macOS (Apple Silicon + Intel) |
            | `zeusdl-windows-x64.exe` | Windows x64 |

            `SHA256SUMS.txt` — vérification d'intégrité de tous les binaires.
          files: |
            dist/zeusdl-android-arm64
            dist/zeusdl-android-x86_64
            dist/zeusdl-linux-x64
            dist/zeusdl-macos
            dist/zeusdl-windows-x64.exe
            dist/SHA256SUMS.txt
