name: Build All Binaries (Android + PC)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026.06.13)"
        required: false
        default: ""

permissions:
  contents: write


  # ─── Android arm64-v8a ────────────────────────────────────────────────────────
  build-android-arm64:
    name: Android arm64-v8a (PIE)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build PIE binary inside musllinux Docker (aarch64 — Nuitka)
        working-directory: zeusdl/zeusdl
        run: |
          cat > /tmp/build_nuitka.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          cd /yt-dlp

          # Install zeusdl dependencies
          py3.13 -m pip install -e ".[default]" --quiet 2>/dev/null || \
              py3.13 -m pip install -e "." --quiet

          # Install Nuitka and build tools
          py3.13 -m pip install nuitka ordered-set zstandard --quiet
          py3.13 -m nuitka --version

          # Build Nuitka onefile with PIE (ET_DYN) flags.
          # Android PackageManager only extracts ET_DYN files from jniLibs/
          # to nativeLibraryDir. nativeLibraryDir is exec-capable (apk_data_file).
          # Nuitka extracts Python libs via dlopen() — NOT execve() — so
          # extraction to cacheDir (app_data_file) is SELinux-allowed.
          mkdir -p /yt-dlp/dist

          CFLAGS="-fPIE" LDFLAGS="-pie" \
          py3.13 -m nuitka \
              --onefile \
              --output-dir=/yt-dlp/dist \
              --output-filename="${EXE_NAME}" \
              --assume-yes-for-downloads \
              --lto=yes \
              --python-flag=no_site \
              /yt-dlp/zeusdl/__main__.py

          file /yt-dlp/dist/${EXE_NAME}
          ls -lh /yt-dlp/dist/${EXE_NAME}
          INNEREOF

          chmod +x /tmp/build_nuitka.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_nuitka.sh:/build_nuitka.sh:ro" \
            -e EXE_NAME="zeusdl-android-arm64" \
            ghcr.io/yt-dlp/musllinux_1_2_aarch64-shared:latest \
            bash /build_nuitka.sh

          sudo chmod -R a+r dist/

      - name: Verify — PIE (ET_DYN) required for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          ELF_TYPE=$(python3 -c "
import struct
with open('dist/zeusdl-android-arm64', 'rb') as f:
    f.seek(16)
    print(struct.unpack('<H', f.read(2))[0])
")
          echo "ELF e_type=${ELF_TYPE} (2=ET_EXEC, 3=ET_DYN)"
          [ "${ELF_TYPE}" = "3" ] || (echo "ERROR: not PIE/ET_DYN — Android PackageManager rejects this"; exit 1)
          echo "OK — arm64 is PIE (ET_DYN) — ready for Android jniLibs"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: zeusdl/zeusdl/dist/zeusdl-android-arm64

  # ─── Android x86_64 ───────────────────────────────────────────────────────────
  build-android-x86_64:
    name: Android x86_64 (PIE)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build PIE binary inside musllinux Docker (x86_64 — Nuitka)
        working-directory: zeusdl/zeusdl
        run: |
          cat > /tmp/build_nuitka.sh << 'INNEREOF'
          #!/bin/bash
          set -ex

          cd /yt-dlp

          py3.13 -m pip install -e ".[default]" --quiet 2>/dev/null || \
              py3.13 -m pip install -e "." --quiet

          py3.13 -m pip install nuitka ordered-set zstandard --quiet
          py3.13 -m nuitka --version

          mkdir -p /yt-dlp/dist

          CFLAGS="-fPIE" LDFLAGS="-pie" \
          py3.13 -m nuitka \
              --onefile \
              --output-dir=/yt-dlp/dist \
              --output-filename="${EXE_NAME}" \
              --assume-yes-for-downloads \
              --lto=yes \
              --python-flag=no_site \
              /yt-dlp/zeusdl/__main__.py

          file /yt-dlp/dist/${EXE_NAME}
          ls -lh /yt-dlp/dist/${EXE_NAME}
          INNEREOF

          chmod +x /tmp/build_nuitka.sh

          docker run --rm \
            --workdir /yt-dlp \
            -v "$(pwd):/yt-dlp" \
            -v "/tmp/build_nuitka.sh:/build_nuitka.sh:ro" \
            -e EXE_NAME="zeusdl-android-x86_64" \
            ghcr.io/yt-dlp/musllinux_1_2_x86_64-shared:latest \
            bash /build_nuitka.sh

          sudo chmod -R a+r dist/

      - name: Verify — PIE (ET_DYN) required for Android jniLibs
        working-directory: zeusdl/zeusdl
        run: |
          ELF_TYPE=$(python3 -c "
import struct
with open('dist/zeusdl-android-x86_64', 'rb') as f:
    f.seek(16)
    print(struct.unpack('<H', f.read(2))[0])
")
          echo "ELF e_type=${ELF_TYPE} (2=ET_EXEC, 3=ET_DYN)"
          [ "${ELF_TYPE}" = "3" ] || (echo "ERROR: not PIE/ET_DYN — Android PackageManager rejects this"; exit 1)
          echo "OK — x86_64 is PIE (ET_DYN) — ready for Android jniLibs"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: zeusdl/zeusdl/dist/zeusdl-android-x86_64


  # ─── Linux x64 ────────────────────────────────────────────────────────────────
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Linux binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-linux-x64 \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-linux-x64
          ls -lh dist/zeusdl-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-linux-x64
          path: zeusdl/zeusdl/dist/zeusdl-linux-x64

  # ─── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS binary
        working-directory: zeusdl/zeusdl
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>/dev/null || pip install -e "." --quiet
          python -m PyInstaller \
            --onefile \
            --name zeusdl-macos \
            --strip \
            zeusdl/__main__.py
          file dist/zeusdl-macos
          ls -lh dist/zeusdl-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-macos
          path: zeusdl/zeusdl/dist/zeusdl-macos

  # ─── Windows x64 ──────────────────────────────────────────────────────────────
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows binary
        working-directory: zeusdl/zeusdl
        shell: pwsh
        run: |
          pip install pyinstaller --quiet
          pip install -e ".[default]" --quiet 2>$null
          if ($LASTEXITCODE -ne 0) { pip install -e "." --quiet }
          python -m PyInstaller `
            --onefile `
            --name zeusdl-windows-x64 `
            --strip `
            zeusdl/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeusdl-windows-x64
          path: zeusdl/zeusdl/dist/zeusdl-windows-x64.exe

  # ─── Publish Release ──────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-android-arm64
      - build-android-x86_64
      - build-linux-x64
      - build-macos
      - build-windows-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 checksums
        run: |
          cd dist
          sha256sum \
            zeusdl-android-arm64 \
            zeusdl-android-x86_64 \
            zeusdl-linux-x64 \
            zeusdl-macos \
            zeusdl-windows-x64.exe \
            | tee SHA256SUMS.txt

      - name: Compute tag name
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="$(date -u '+%Y.%m.%d')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL — ${{ steps.tag.outputs.tag }}

            ### Android — Binaires 100% Statiques
            Compilés avec **musl Python 3.13 + Nuitka**.
            Binaires PIE (ET_DYN) — exécution garantie sur Android 10+ via SELinux-safe nativeLibraryDir.
            Compatible Android 5.0+ (API 21+).

            | Fichier | Architecture |
            |---------|-------------|
            | `zeusdl-android-arm64` | Android arm64-v8a (99% des appareils modernes) |
            | `zeusdl-android-x86_64` | Android x86_64 (émulateurs, Chromebooks x86) |

            ### PC — Binaires Natifs
            Compilés avec **Python 3.12 + PyInstaller** nativement.

            | Fichier | Plateforme |
            |---------|-----------|
            | `zeusdl-linux-x64` | Linux x86_64 |
            | `zeusdl-macos` | macOS (Apple Silicon + Intel) |
            | `zeusdl-windows-x64.exe` | Windows x64 |

            `SHA256SUMS.txt` — vérification d'intégrité de tous les binaires.
          files: |
            dist/zeusdl-android-arm64
            dist/zeusdl-android-x86_64
            dist/zeusdl-linux-x64
            dist/zeusdl-macos
            dist/zeusdl-windows-x64.exe
            dist/SHA256SUMS.txt
