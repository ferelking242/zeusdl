name: ZeusDL — Android Bundle Autosuffisant

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (ex: 2026.06.14)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-android-bundle:
    name: Android — Bundle Python autosuffisant (ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build zeusdl.zip avec deps vendorées ARM64
        run: |
          set -euo pipefail

          STAGING="$(mktemp -d)/bundle"
          mkdir -p "$STAGING"

          cd zeusdl/zeusdl

          # ── 1. Code source ZeusDL ─────────────────────────────────────────
          cp -r zeusdl/ "$STAGING/zeusdl"

          # ── 2. __main__.py à la racine — via runpy (respecte __name__=="__main__")
          cat > "$STAGING/__main__.py" << 'PYEOF'
#!/usr/bin/env python3
# Point d'entrée Watchtower — lance le module zeusdl via runpy
# runpy.run_module respecte les guards "if __name__ == '__main__'"
import sys, os
sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))
import runpy
runpy.run_module('zeusdl', run_name='__main__', alter_sys=True)
PYEOF

          # ── 3. Vendoring deps Python ARM64 ────────────────────────────────
          echo "Vendoring deps manylinux aarch64 (Python 3.11)..."
          pip install \
            requests \
            certifi \
            urllib3 \
            websockets \
            mutagen \
            charset-normalizer \
            idna \
            --target "$STAGING" \
            --platform manylinux2014_aarch64 \
            --only-binary=:all: \
            --python-version 3.11 \
            --implementation cp \
            --no-compile \
            -q 2>&1 | tail -5 || {
            echo "⚠️  Fallback : installation sans contrainte de plateforme"
            pip install requests certifi urllib3 websockets mutagen charset-normalizer idna \
              --target "$STAGING" --no-compile -q 2>&1 | tail -3
          }

          # yt-dlp optionnel (zeusdl peut l'embarquer lui-même)
          pip install yt-dlp \
            --target "$STAGING" \
            --platform manylinux2014_aarch64 \
            --only-binary=:all: \
            --python-version 3.11 \
            --implementation cp \
            --no-compile -q 2>&1 | tail -3 \
            || echo "⚠️  yt-dlp wheel ARM64 non dispo — zeusdl embarque sa propre implémentation"

          # ── 4. Nettoyage ──────────────────────────────────────────────────
          find "$STAGING" -name "*.dist-info" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$STAGING" -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$STAGING" -name "*.pth" -delete 2>/dev/null || true
          find "$STAGING" -name "*.pyc" -delete 2>/dev/null || true

          # ── 5. Créer zeusdl.zip ───────────────────────────────────────────
          cd "$STAGING"
          zip -qr "$OLDPWD/../../zeusdl.zip" .
          cd -

          # ── 6. Vérification ───────────────────────────────────────────────
          echo "=== Vérification zeusdl.zip ==="
          python3 - << 'PYEOF'
import zipfile
z = zipfile.ZipFile('zeusdl.zip')
names = z.namelist()
has_main   = any(n == '__main__.py' for n in names)
has_zeusdl = any(n.startswith('zeusdl/') for n in names)
has_req    = any(n.startswith('requests/') for n in names)
# Valider que __main__.py utilise runpy
main_src = z.read('__main__.py').decode() if has_main else ''
uses_runpy = 'runpy' in main_src
print(f'Fichiers total   : {len(names)}')
print(f'__main__.py      : {has_main} (runpy: {uses_runpy})')
print(f'zeusdl/          : {has_zeusdl}')
print(f'requests/        : {has_req}')
if not has_main or not has_zeusdl:
    print('❌ STRUCTURE INVALIDE'); exit(1)
if not uses_runpy:
    print('❌ __main__.py sans runpy — corrigez le workflow'); exit(1)
top = sorted({n.split('/')[0] for n in names})
print('Top-level:', top[:15])
print('✅ Structure valide')
PYEOF
          echo "Taille : $(du -sh zeusdl.zip)"

      - uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-bundle
          path: zeusdl.zip

      - name: Compute tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="$(date -u '+%Y.%m.%d')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ZeusDL Bundle — ${{ steps.tag.outputs.tag }}"
          prerelease: false
          body: |
            ## ZeusDL Bundle Android — ${{ steps.tag.outputs.tag }}
            - `__main__.py` — point d'entrée via `runpy.run_module` (guards `__name__` respectés)
            - `zeusdl/` — package ZeusDL complet
            - `requests/` `certifi/` `urllib3/` `websockets/` `mutagen/` — deps vendorées ARM64
            - Zéro `libpython.so` — runtime dans l'APK Watchtower
          files: zeusdl.zip
