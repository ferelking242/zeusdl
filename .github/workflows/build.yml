name: Build ZeusDL

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  build-desktop:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: zeusdl-linux-x86_64
            ext: ''
          - os: ubuntu-24.04-arm
            artifact: zeusdl-linux-arm64
            ext: ''
          - os: windows-2022
            artifact: zeusdl-windows-x86_64
            ext: '.exe'
          - os: macos-13
            artifact: zeusdl-macos-x86_64
            ext: ''
          - os: macos-14
            artifact: zeusdl-macos-arm64
            ext: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        working-directory: zeusdl
        run: |
          pip install pyinstaller brotli certifi mutagen pycryptodomex requests urllib3 websockets yt-dlp-ejs
          pip install -e .[default]

      - name: Generate lazy extractors
        working-directory: zeusdl
        run: python3 devscripts/make_lazy_extractors.py zeusdl/extractor/lazy_extractors.py

      - name: Build binary
        working-directory: zeusdl
        run: >-
          pyinstaller
          --onefile
          --name ${{ matrix.artifact }}
          --collect-all zeusdl
          --copy-metadata zeusdl
          --hidden-import "zeusdl.extractor.lazy_extractors"
          zeusdl/__main__.py

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip zeusdl/dist/${{ matrix.artifact }}

      - name: Compute SHA256 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd zeusdl/dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256
          fi

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $f = "zeusdl/dist/${{ matrix.artifact }}${{ matrix.ext }}"
          $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}${{ matrix.ext }}" | Out-File -Encoding utf8 "zeusdl/dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            zeusdl/dist/${{ matrix.artifact }}${{ matrix.ext }}
            zeusdl/dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256
          retention-days: 7

  build-android-arm64:
    name: Build zeusdl-android-arm64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine aarch64 (musl)
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: alpine_latest
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          install: |
            apk add --no-cache python3 py3-pip python3-dev gcc musl-dev binutils patchelf
          run: |
            cd /workspace/zeusdl
            pip3 install --break-system-packages pyinstaller brotli certifi mutagen pycryptodomex requests urllib3 websockets yt-dlp-ejs
            pip3 install --break-system-packages -e .[default]
            python3 devscripts/make_lazy_extractors.py zeusdl/extractor/lazy_extractors.py
            pyinstaller --onefile --name zeusdl-android-arm64 --collect-all zeusdl --copy-metadata zeusdl --hidden-import "zeusdl.extractor.lazy_extractors" --strip zeusdl/__main__.py
            sha256sum dist/zeusdl-android-arm64 > dist/zeusdl-android-arm64.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-arm64
          path: |
            zeusdl/dist/zeusdl-android-arm64
            zeusdl/dist/zeusdl-android-arm64.sha256
          retention-days: 7

  build-android-x86_64:
    name: Build zeusdl-android-x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine x86_64 (musl) via Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            alpine:3.19 \
            sh -c "apk add --no-cache python3 py3-pip python3-dev gcc musl-dev binutils patchelf && cd /workspace/zeusdl && pip3 install --break-system-packages pyinstaller brotli certifi mutagen pycryptodomex requests urllib3 websockets yt-dlp-ejs && pip3 install --break-system-packages -e .[default] && python3 devscripts/make_lazy_extractors.py zeusdl/extractor/lazy_extractors.py && pyinstaller --onefile --name zeusdl-android-x86_64 --collect-all zeusdl --copy-metadata zeusdl --hidden-import zeusdl.extractor.lazy_extractors --strip zeusdl/__main__.py && sha256sum dist/zeusdl-android-x86_64 > dist/zeusdl-android-x86_64.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: zeusdl-android-x86_64
          path: |
            zeusdl/dist/zeusdl-android-x86_64
            zeusdl/dist/zeusdl-android-x86_64.sha256
          retention-days: 7

  release:
    name: Publish Release
    needs: [build-desktop, build-android-arm64, build-android-x86_64]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd release-assets
          cat *.sha256 | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly-$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ZeusDL ${{ steps.tag.outputs.tag }}
          draft: ${{ steps.tag.outputs.draft }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/zeusdl-linux-x86_64
            release-assets/zeusdl-linux-x86_64.sha256
            release-assets/zeusdl-linux-arm64
            release-assets/zeusdl-linux-arm64.sha256
            release-assets/zeusdl-windows-x86_64.exe
            release-assets/zeusdl-windows-x86_64.exe.sha256
            release-assets/zeusdl-macos-x86_64
            release-assets/zeusdl-macos-x86_64.sha256
            release-assets/zeusdl-macos-arm64
            release-assets/zeusdl-macos-arm64.sha256
            release-assets/zeusdl-android-arm64
            release-assets/zeusdl-android-arm64.sha256
            release-assets/zeusdl-android-x86_64
            release-assets/zeusdl-android-x86_64.sha256
            release-assets/SHA256SUMS.txt
