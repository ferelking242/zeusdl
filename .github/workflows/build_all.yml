name: Build All Platforms

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - profile
          - debug

jobs:
  build-android:
    name: Android (arm64-v8a + armeabi-v7a + x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true
      - name: Flutter pub get
        working-directory: client
        run: flutter pub get
      - name: Generate code
        working-directory: client
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build APKs split-per-abi
        working-directory: client
        run: flutter build apk --${{ github.event.inputs.build_mode }} --split-per-abi
      - name: Build AAB (Play Store)
        working-directory: client
        run: flutter build appbundle --${{ github.event.inputs.build_mode }}
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.event.inputs.build_mode }}
          path: client/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.event.inputs.build_mode }}
          path: client/build/app/outputs/bundle/**/*.aab
          retention-days: 30

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Flutter pub get
        working-directory: client
        run: flutter pub get
      - name: Generate code
        working-directory: client
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Linux
        working-directory: client
        run: flutter build linux --${{ github.event.inputs.build_mode }}
      - name: Package Linux bundle
        working-directory: client
        run: |
          cd build/linux/x64/${{ github.event.inputs.build_mode }}/bundle
          tar -czf ../../../../../zeus_client-linux-x64-${{ github.event.inputs.build_mode }}.tar.gz .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-${{ github.event.inputs.build_mode }}
          path: client/zeus_client-linux-x64-${{ github.event.inputs.build_mode }}.tar.gz
          retention-days: 30

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Flutter pub get
        working-directory: client
        run: flutter pub get
      - name: Generate code
        working-directory: client
        run: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Windows
        working-directory: client
        run: flutter build windows --${{ github.event.inputs.build_mode }}
      - name: Zip Windows build
        working-directory: client/build/windows/x64/runner
        run: |
          Compress-Archive -Path Release\* -DestinationPath ..\..\..\..\..\zeus_client-windows-x64-${{ github.event.inputs.build_mode }}.zip
        shell: pwsh
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ github.event.inputs.build_mode }}
          path: client/zeus_client-windows-x64-${{ github.event.inputs.build_mode }}.zip
          retention-days: 30

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🏛️ ZeusDL Client — Build All Platforms" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android (arm64+armv7+x86_64) | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux x64 | ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows x64 | ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
