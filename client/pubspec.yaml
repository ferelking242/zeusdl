name: zeus_client
description: ZeusDL - Client de téléchargement multi-plateformes
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Network
  dio: ^5.4.3
  web_socket_channel: ^3.0.1

  # UI & Animations
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  flex_color_scheme: ^7.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0

  # Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0
  logger: ^2.3.0
  uuid: ^4.3.3
  file_picker: ^8.0.0+1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
